<div class="relative">
  <button
    type="button"
    class="flex cursor-pointer items-center justify-center mx-3 text-white font-semibold bg-gray-800 rounded-full w-10 h-10 text-base md:mr-0 focus:ring-4 focus:ring-gray-300 dark:focus:ring-gray-600"
    (click)="toggleDropdown()"
  >
    <span class="sr-only">Open user menu</span>
    <span class="uppercase">{{ dataUser.initials }}</span>
  </button>

  <!-- Dropdown -->
  @if(isDropdownOpen){
  <div
    class="absolute right-0 z-50 my-4 w-56 text-base list-none bg-white rounded divide-y divide-gray-100 shadow dark:bg-gray-700 dark:divide-gray-600"
  >
    <div class="py-3 px-4">
      <span class="block text-sm font-semibold text-gray-900 dark:text-white">
        {{ dataUser.username }}
      </span>
    </div>
    <ul class="py-1 text-gray-500 dark:text-gray-400">
      <li>
        <a
          (click)="endSession()"
          class="cursor-pointer block py-2 px-4 text-sm hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-gray-400 dark:hover:text-white"
        >
          Cerrar Sesión
        </a>
      </li>
    </ul>
  </div>
  }
</div>
