@if(isOpen()){
<!-- Modal backdrop con overlay semi-transparente -->
<div
  class="fixed inset-0 z-40 flex items-center justify-center overflow-y-auto overflow-x-hidden bg-gray-900/50 dark:bg-gray-900/80"
  id="updateUserModal"
>
  <div
    class="relative max-h-[90vh] w-full max-w-md overflow-y-auto rounded-lg bg-white p-4 shadow dark:bg-gray-800 sm:max-w-lg md:max-w-3xl"
  >
    <!-- Encabezado del modal -->
    <div
      class="mb-2 flex items-start justify-between pb-3 dark:border-gray-700"
    >
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
        Evento Asignado
      </h3>
      <button
        type="button"
        (click)="onClose()"
        class="cursor-pointer ml-auto inline-flex items-center rounded-lg bg-transparent p-1.5 text-sm text-gray-400 hover:bg-gray-200 hover:text-gray-900 dark:hover:bg-gray-600 dark:hover:text-white"
      >
        <svg
          class="h-5 w-5"
          fill="currentColor"
          viewBox="0 0 20 20"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            fill-rule="evenodd"
            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
            clip-rule="evenodd"
          ></path>
        </svg>
      </button>
    </div>

    <div class="max-h-[calc(95vh-8rem)] overflow-y-auto px-1">
      <form [formGroup]="form">
        <div class="mb-3 grid grid-cols-1 gap-3 sm:grid-cols-3">
          <div>
            <label
              class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
              >Cliente
            </label>
            <input
              type="text"
              formControlName="subscriber"
              readonly
              class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
            />
          </div>
          <div>
            <label
              class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
              >Vehiculo
            </label>
            <input
              type="text"
              formControlName="vehicle"
              readonly
              class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
            />
          </div>
          <div>
            <label
              for="type"
              class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
            >
              Se Confirmo la cita?
            </label>
            <input
              type="text"
              formControlName="isConfirmed"
              readonly
              class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
            />
          </div>
        </div>

        <div class="mb-3 grid grid-cols-1 gap-3 sm:grid-cols-2">
          <div>
            <label
              class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
              >Fecha
            </label>
            <input
              type="date"
              formControlName="appointment_date"
              readonly
              class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
            />
          </div>
          <div>
            <label
              class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
              >Hora
            </label>
            <input
              type="time"
              formControlName="appointment_time"
              readonly
              class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
            />
          </div>
        </div>
        <div class="mb-3">
          <div>
            <label
              class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
              >Nota Importante
            </label>
            <input
              type="text"
              formControlName="notes"
              readonly
              class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
            />
          </div>
        </div>
        <div class="mb-3">
          <div>
            <label
              class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
              >Descripción
            </label>
            <textarea
              formControlName="description"
              readonly
              class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 resize-y min-h-[100px] max-h-[220px]"
            ></textarea>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

}
