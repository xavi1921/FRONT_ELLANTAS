<!-- Leyenda de colores -->
<div class="p-4 flex items-center gap-4">
  <div class="flex items-center gap-2 dark:text-white">
    <div class="w-4 h-4 rounded-full bg-[#d06b56]"></div>
    <span class="text-sm">Evento pasado</span>
  </div>
  <div class="flex items-center gap-2 dark:text-white">
    <div class="w-4 h-4 rounded-full bg-[#6477f1]"></div>
    <span class="text-sm">Evento de hoy</span>
  </div>
  <div class="flex items-center gap-2 dark:text-white">
    <div class="w-4 h-4 rounded-full bg-[#e5ea68]"></div>
    <span class="text-sm">Evento futuro</span>
  </div>
</div>
<div class="flex flex-1 w-full h-full p-4">
    <div class="flex-grow">
      <full-calendar [options]="calendarOptions" class="w-full h-full"></full-calendar>
    </div>
</div>
<app-events [isOpen]="isOpen" [appointment]="selectedEvent" (closeModal)="closeModal()"></app-events>
