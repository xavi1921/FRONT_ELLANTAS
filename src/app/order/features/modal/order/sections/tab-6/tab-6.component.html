<div class="w-full">
  <!-- Título del componente -->
  <form [formGroup]="form()!">
    <div class="mb-3">
      <label
        class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
        >Orden Creada Por</label
      >
      <input
        type="text"
        formControlName="createdBy"
        readonly
        class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
      />
    </div>
    <h1 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">
      Retiro del Vehiculo
    </h1>
    <div class="mb-3 grid grid-cols-1 gap-3 sm:grid-cols-2">
      <div>
        <label
          for="name"
          class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
        >
          Propietario o Delegado del Vehiculo
        </label>
        <input
          formControlName="delegate"
          readonly
          type="text"
          id="fullName"
          class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
        />
      </div>

      <div>
        <label
          for="observation"
          class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
          >Numero de Identificación
        </label>
        <input
          formControlName="identification"
          readonly
          type="text"
          id="observation"
          class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
        />
      </div>
    </div>
  </form>
</div>
