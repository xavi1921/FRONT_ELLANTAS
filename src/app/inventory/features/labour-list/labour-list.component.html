<section class="bg-gray-50 dark:bg-gray-900 p-3 sm:p-5">
  <div class="mx-auto px-4 lg:px-12">
    <div
      class="bg-white dark:bg-gray-800 relative shadow-md sm:rounded-lg overflow-hidden"
    >
      <h1
        class="px-5 pt-3 text-xl font-semibold text-gray-900 sm:text-2xl dark:text-white"
      >
        Actividades
      </h1>
      <div
        class="flex flex-col md:flex-row items-center justify-between space-y-3 md:space-y-0 md:space-x-4 p-4"
      >
        <div class="w-full md:w-1/2">
          <form class="flex items-center">
            <label for="simple-search" class="sr-only">Search</label>
            <div class="relative w-full">
              <div
                class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
              >
                <svg
                  aria-hidden="true"
                  class="w-5 h-5 text-gray-500 dark:text-gray-400"
                  fill="currentColor"
                  viewbox="0 0 20 20"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    fill-rule="evenodd"
                    d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                    clip-rule="evenodd"
                  />
                </svg>
              </div>
              <input
                type="text"
                [(ngModel)]="valueFilter"
                (keyup.enter)="filter()"
                (ngModelChange)="cleanFilter()"
                name="search"
                id="simple-search"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-l-lg focus:ring-primary-500 focus:border-primary-500 block w-full pl-10 p-2 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                placeholder="Filtrar por Producto"
                required=""
              />
            </div>
            <div>
              <button
                (click)="filter()"
                type="button"
                class="flex cursor-pointer rounded-r-lg items-center justify-center text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:ring-primary-300 font-medium text-sm px-4 py-[9px] dark:bg-primary-600 dark:hover:bg-primary-700 focus:outline-none dark:focus:ring-primary-800"
              >
                Buscar
              </button>
            </div>
          </form>
        </div>
        <div
          *hasRole="['Mecanico', 'Super Admin', 'Admin']"
          class="w-full md:w-auto flex flex-col md:flex-row space-y-2 md:space-y-0 items-stretch md:items-center justify-end md:space-x-3 flex-shrink-0"
        >
          <button
            (click)="openModal()"
            type="button"
            class="flex cursor-pointer items-center justify-center text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:ring-primary-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-primary-600 dark:hover:bg-primary-700 focus:outline-none dark:focus:ring-primary-800"
          >
            <svg
              class="h-5 w-5 mr-2"
              fill="currentColor"
              viewbox="0 0 20 20"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                clip-rule="evenodd"
                fill-rule="evenodd"
                d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
              />
            </svg>
            Registrar
          </button>
        </div>
      </div>

      <div class="overflow-x-auto overflow-y-hidden w-full">
        <table
          class="w-full text-sm text-left text-gray-500 dark:text-gray-400"
        >
          <thead
            class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400"
          >
            <tr>
              <th scope="col" class="px-4 py-3">Actividad</th>
              <th scope="col" class="px-4 py-3">Precio</th>
              <th scope="col" class="px-4 py-3">
                <span class="sr-only">Actions</span>
              </th>
            </tr>
          </thead>
          <tbody>
            @for (item of labour; track $index) {
            <tr class="border-b border-slate-300 dark:border-gray-700">
              <th
                scope="row"
                class="px-4 py-3 font-medium text-gray-900 whitespace-nowrap dark:text-white"
              >
                {{ item.name }}
              </th>
              <td class="px-4 py-3">{{ item.price | currency }}</td>

              <td class="px-4 py-3 flex items-center justify-end">
                <div class="relative inline-block">
                  <button
                    id="button-{{ item._id }}"
                    (click)="toggleDropdown(item._id)"
                    class="cursor-pointer inline-flex items-center p-0.5 text-sm font-medium text-center text-gray-500 hover:text-gray-800 rounded-lg focus:outline-none dark:text-gray-400 dark:hover:text-gray-100"
                    type="button"
                  >
                    <svg
                      class="w-5 h-5"
                      aria-hidden="true"
                      fill="currentColor"
                      viewbox="0 0 20 20"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M6 10a2 2 0 11-4 0 2 2 0 014 0zM12 10a2 2 0 11-4 0 2 2 0 014 0zM16 12a2 2 0 100-4 2 2 0 000 4z"
                      />
                    </svg>
                  </button>
                  @if(isDropdownOpen[item._id]){
                  <div
                    class="fixed z-10 w-44 bg-white rounded divide-y divide-gray-100 shadow dark:bg-gray-700 dark:divide-gray-600"
                    [ngStyle]="dropdownPosition(item._id)"
                  >
                    <ul class="py-1 text-sm text-gray-700 dark:text-gray-200">
                      <li *hasRole="['Mecanico', 'Super Admin', 'Admin']">
                        <a
                          (click)="openModal(item)"
                          class="cursor-pointer block py-2 px-4 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white"
                          >Editar</a
                        >
                      </li>
                    </ul>
                    <div class="py-1" *hasRole="['Super Admin', 'Admin']">
                      <a
                        (click)="delete(item)"
                        class="cursor-pointer block py-2 px-4 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-gray-200 dark:hover:text-white"
                        >Eliminar</a
                      >
                    </div>
                  </div>
                  }
                </div>
              </td>
            </tr>
            }
          </tbody>
        </table>
        @if(errorMessage && labour.length===0){
        <app-error-message [message]="errorMessage"></app-error-message>
        } @else if(labour.length===0){
        <app-error-message message="No hay Resultados"></app-error-message>
        }
      </div>
      <app-pagination
        [totalItems]="totalItems"
        [pageEvent]="pageEvent"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)"
        [module]="'Actividades'"
      >
      </app-pagination>
    </div>
  </div>
</section>
<app-modal
  [isOpen]="open"
  [labour]="selectedLabour"
  (save)="create($event)"
  (edit)="edit($event)"
  (closeModal)="closeModal()"
></app-modal>
<app-spinner [load]="load"></app-spinner>
