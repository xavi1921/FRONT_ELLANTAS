<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-lg shadow-md">
      <div class="flex justify-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-12 h-12 text-black-600"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
          />
        </svg>
      </div>
  
      <h2 class="text-2xl font-bold text-center text-gray-800">
        Restablecer Contraseña
      </h2>
      <p class="text-center text-gray-600">
        Ingresa tu nueva contraseña y confírmala para completar el proceso.
      </p>
  
      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Nueva contraseña -->
        <div class="relative">
          <label for="newPassword" class="block text-sm font-medium text-gray-700"
            >Nueva Contraseña</label
          >
          <input
            [type]="isShowingNewPassword ? 'text' : 'password'"
            id="newPassword"
            [(ngModel)]="newPassword"
            name="newPassword"
            class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
            placeholder="Ingresa tu nueva contraseña"
          />
          <a
            class="absolute right-3 top-11 transform -translate-y-1/2 text-gray-400 cursor-pointer"
            title="Mostrar u ocultar contraseña"
            (click)="toggleNewPassword()"
          >
            <i
              [class]="isShowingNewPassword ? 'fas fa-eye' : 'fas fa-eye-slash'"
            ></i>
          </a>
          <p
            *ngIf="newPassword && !isPasswordValid"
            class="text-red-500 text-sm mt-1"
          >
            La contraseña debe tener al menos 8 caracteres y un carácter especial.
          </p>
        </div>
  
        <div class="relative">
          <label
            for="confirmPassword"
            class="block text-sm font-medium text-gray-700"
            >Confirmar Contraseña</label
          >
          <input
            [type]="isShowingConfirmPassword ? 'text' : 'password'"
            id="confirmPassword"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
            placeholder="Confirma tu nueva contraseña"
          />
          <a
            class="absolute right-3 top-11 transform -translate-y-1/2 text-gray-400 cursor-pointer"
            title="Mostrar u ocultar contraseña"
            (click)="toggleConfirmPassword()"
          >
            <i
              [class]="
                isShowingConfirmPassword ? 'fas fa-eye' : 'fas fa-eye-slash'
              "
            ></i>
          </a>
          <div *ngIf="passwordsDoNotMatch" class="text-red-500 text-sm">
            Las contraseñas no coinciden.
          </div>
        </div>
  
        <button
          type="submit"
          class="w-full px-4 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 disabled:opacity-50"
          [disabled]="!newPassword || !confirmPassword || passwordsDoNotMatch"
        >
          Restablecer Contraseña
        </button>
      </form>
    </div>
  </div>
