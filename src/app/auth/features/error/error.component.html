<div
  class="min-h-screen w-full flex flex-col items-center justify-center bg-gradient-to-br from-blue-600 via-purple-600 to-pink-600 px-4 py-8 sm:p-6 md:p-10 lg:p-16 overflow-hidden relative"
>
  <div class="absolute inset-0 bg-black opacity-10 z-0"></div>

  <div class="relative z-10 max-w-4xl w-full text-center">
    <h1
      class="text-4xl sm:text-5xl md:text-6xl lg:text-8xl font-extrabold text-white mb-8 animate-pulse"
    >
      {{ title }}
    </h1>
    <p
      class="text-lg sm:text-xl md:text-2xl lg:text-3xl text-white mb-12 animate-bounce"
    >
      {{ message }}
    </p>
    <div
      class="flex flex-col md:flex-row items-center justify-center gap-4 sm:gap-6"
    >
      @if (showLink) {
      <button
        (click)="recoveryPage()"
        class="w-full md:w-auto bg-white text-purple-600 font-bold py-3 px-6 sm:px-8 rounded-full hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-white transition-all duration-300 ease-in-out transform hover:scale-105 text-base sm:text-lg"
      >
        {{ linkText }}
      </button>
      }

      <a
        routerLink="/auth"
        class="cursor-pointer text-white hover:text-pink-200 transition-colors duration-300 text-base sm:text-lg underline text-center mt-2 md:mt-0"
      >
        Volver a la página principal
      </a>
    </div>
  </div>

  <div class="absolute bottom-0 left-0 w-full overflow-hidden z-0">
    <svg
      class="w-full h-auto"
      viewBox="0 0 1200 120"
      preserveAspectRatio="none"
    >
      <path
        d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"
        fill="rgba(255, 255, 255, 0.2)"
      ></path>
    </svg>
  </div>

  <!-- Blobs decorativos ocultos en pantallas pequeñas -->
  <div
    class="hidden sm:block absolute top-0 right-0 w-64 h-64 md:w-96 md:h-96 bg-gradient-to-br from-yellow-400 to-pink-500 rounded-full filter blur-3xl opacity-30 animate-blob"
  ></div>
  <div
    class="hidden sm:block absolute bottom-0 left-0 w-64 h-64 md:w-96 md:h-96 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full filter blur-3xl opacity-30 animate-blob animation-delay-2000"
  ></div>
</div>
