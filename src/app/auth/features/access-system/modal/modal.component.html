@if(isOpen()){
    <!-- Modal backdrop con overlay semi-transparente -->
    <div
      class="fixed inset-0 z-40 flex items-center justify-center overflow-y-auto overflow-x-hidden bg-gray-900/50 dark:bg-gray-900/80"
      id="updateUserModal"
    >
      <div
        class="relative max-h-[90vh] w-full max-w-md overflow-y-auto rounded-lg bg-white p-4 shadow dark:bg-gray-800 sm:max-w-lg md:max-w-xl"
      >
        <!-- Encabezado del modal -->
        <div
          class="mb-2 flex items-start justify-between pb-3 dark:border-gray-700"
        >
          <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
            {{ role() ? "Editar Role" : "Crear Role" }}
          </h3>
          <button
            type="button"
            (click)="onClose()"
            class="cursor-pointer ml-auto inline-flex items-center rounded-lg bg-transparent p-1.5 text-sm text-gray-400 hover:bg-gray-200 hover:text-gray-900 dark:hover:bg-gray-600 dark:hover:text-white"
          >
            <svg
              class="h-5 w-5"
              fill="currentColor"
              viewBox="0 0 20 20"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill-rule="evenodd"
                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                clip-rule="evenodd"
              ></path>
            </svg>
          </button>
        </div>
    
        <div class="max-h-[calc(95vh-8rem)] overflow-y-auto px-1">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3 grid grid-cols-1 gap-3 sm:grid-cols-2">
                <div>
                    <label
                      class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
                      >Nombre del Rol</label
                    >
                    <input
                      formControlName="name"
                      type="text"
                      class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                    />
                   
                    @if(form.get('name')?.hasError('required') &&
                    (form.get('name')?.touched ||
                    form.get('name')?.dirty)){
                    <app-tool-tip
                      [message]="'Ingrese el nombre del rol'"
                    ></app-tool-tip>
                }
                  </div>
              <div>
                <label
                  for="type"
                  class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
                >
                  Estado
                </label>
                <select
                  id="type"
                  formControlName="status"
                  class="cursor-pointer block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                >
                  <option>Activo</option>
                  <option>Inactivo</option>
                </select>
              </div>

            </div>
            <div class="mb-3">
              <label
                class="mb-1 block text-sm font-medium text-blue-700 dark:text-blue-400"
                >Descripcion</label
              >
              <input
                formControlName="description"
                type="text"
                class="block w-full rounded-lg border border-gray-300 bg-white p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
              />
    
              @if(form.get('name')?.hasError('required') &&
              (form.get('name')?.touched ||
              form.get('name')?.dirty)){
              <app-tool-tip
                [message]="'Describa la función de este rol'"
              ></app-tool-tip>
          }

            </div>
    
           
            <div class="mt-3 flex items-center justify-start gap-3">
              <button
                type="submit"
                [disabled]="!form.valid"
                class="disabled:cursor-default cursor-pointer rounded-lg bg-blue-700 px-4 py-2 text-xs font-medium text-white hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
              >
                {{ role() ? "Actualizar" : "Guardar" }}
              </button>
            </div>
          </form>
        </div>
    
        <!-- Botones de acción - Fijos en la parte inferior -->
      </div>
    </div>
    
    }
