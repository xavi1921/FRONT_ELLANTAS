<div
  class="flex items-center justify-center min-h-screen bg-gray-100 px-4 sm:px-6"
>
  <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-lg shadow-md">
    <div class="flex justify-center">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-12 h-12 text-black-600"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
        />
      </svg>
    </div>

    <h2 class="text-2xl font-bold text-center text-gray-800">
      ¿Tienes problemas para iniciar sesión?
    </h2>
    <p class="text-center text-gray-600">
      Ingresa tu correo electrónico y te enviaremos un enlace para que recuperes
      el acceso a tu cuenta.
    </p>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700"
          >Correo Electrónico</label
        >
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
          placeholder="Ingresa tu correo electronico"
        />
        @if (invalidEmail) {
        <div class="text-red-500 text-sm">Correo inválido.</div>
        }
      </div>
      <button
        type="submit"
        class="w-full px-4 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 disabled:opacity-50"
        [disabled]="loading"
      >
        @if (loading) {
        <i class="fa fa-spinner fa-spin"></i>
        } @else {
        <span>Enviar enlace de recuperación</span>
        }
      </button>
    </form>

    <p class="text-center text-gray-600">
      <span class="pr-2 block sm:inline">¿Recordaste tu contraseña?</span>
      <a href="/login" class="text-blue-600 hover:underline block sm:inline"
        >Inicia sesión</a
      >
    </p>
  </div>
</div>
