<div class="flex items-center justify-center min-h-screen bg-gray-100 px-4 sm:px-6">
    <div class="flex flex-col lg:flex-row w-full max-w-4xl bg-white rounded-xl shadow-2xl">
      <div class="hidden lg:flex lg:w-1/2 items-center justify-center">
        <img
          [src]="logoPath"
          alt="Fonet Logo"
          class="w-full h-full object-cover"
        />
      </div>
  
      <div class="w-full lg:w-1/2 p-8 sm:p-12 lg:p-16 space-y-8">
        <h2 class="text-2xl sm:text-3xl font-extrabold text-center text-gray-900">
          Iniciar sesión en el sistema
        </h2>
        <form (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
          <div class="space-y-4">
            <div class="relative">
              <label for="username" class="sr-only">Nombre de Usuario</label>
              <input
                id="username"
                name="username"
                [(ngModel)]="username"
                required
                class="w-full px-3 py-2 pl-10 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                placeholder="Usuario"
              />
              <i
                class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"
              ></i>
            </div>
            <div class="relative">
              <label for="password" class="sr-only">Contraseña</label>
              <input
                id="password"
                name="password"
                [type]="isShowingPassword ? 'text' : 'password'"
                [(ngModel)]="password"
                autocomplete="current-password"
                required
                class="w-full px-3 py-2 pl-10 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                placeholder="Contraseña"
              />
              <i
                class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"
              ></i>
              <a
                class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 cursor-pointer"
                title="Hide or show password"
                (click)="togglePassword()"
              >
                <i
                  [class]="isShowingPassword ? 'fas fa-eye' : 'fas fa-eye-slash'"
                ></i>
              </a>
            </div>
          </div>
          <div>
            <button
              type="submit"
              [disabled]="isButtonDisabled"
              [ngClass]="
                isButtonDisabled
                  ? 'bg-gray-400 cursor-not-allowed'
                  : 'bg-blue-600 hover:bg-blue-700'
              "
              class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
            >
              Iniciar sesión
            </button>
          </div>
        </form>
        <div class="text-sm text-center">
          <a href="/auth/recover" class="font-medium text-blue-600 hover:text-blue-500">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </div>
    </div>
  </div>
